<!DOCTYPE html>

        .btn { display: inline-block; background: #e74c3c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }

            <a href="#" class="btn">相談してみる（準備中）</a>

</body>
</html>
