<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワンスマホ | スマホ1台・固定費0円の挑戦</title>
    <style>
        :root {
            --main-color: #2c3e50; /* 信頼のネイビー */
            --accent-color: #e67e22; /* 挑戦のオレンジ */
            --bg-color: #f9f9f9;
        }
        body { font-family: sans-serif; margin: 0; padding: 0; background: var(--bg-color); color: #333; line-height: 1.6; }
        header { background: white; border-bottom: 3px solid var(--main-color); padding: 2rem 1rem; text-align: center; }
        .hero-title { font-size: 2.5rem; margin: 0; color: var(--main-color); letter-spacing: 2px; }
        .hero-sub { font-size: 0.9rem; color: #666; margin-top: 0.5rem; }
        
        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        .status-badge { background: var(--accent-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 10px; }
        
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid var(--main-color); }
        h2 { font-size: 1.2rem; margin-top: 0; color: var(--main-color); }
        
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .report-item { background: #eee; padding: 10px; border-radius: 5px; text-align: center; }
        .price { font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .btn { display: block; background: var(--main-color); color: white; text-align: center; padding: 15px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        .btn:active { transform: translateY(2px); }
    </style>
</head>
<body>

<header>
    <div class="status-badge">固定費：ドメイン代のみ</div>
    <h1 class="hero-title">ワンスマホ</h1>
    <p class="hero-sub">スマホ1台、0円から始まる経済圏の実験室</p>
</header>

<div class="container">
    <div class="card">
        <h2>🔬 0円検証ログ</h2>
        <p>「onesumaho.jp」をGitHub Pagesに紐付け完了。SSLも無料。今のところ快適そのもの。次はGoogleフォームの限界を試す。</p>
    </div>

    <div class="card">
        <h2>📊 今月のワンスマホ収支</h2>
        <div class="report-grid">
            <div class="report-item">支出<br><span class="price">¥3,500</span><br>(年額ドメイン代)</div>
            <div class="report-item">収益<br><span class="price">¥0</span><br>(実験開始!)</div>
        </div>
    </div>

    <div class="card">
        <h2>💡 提供できること</h2>
        <ul>
            <li>サーバー代0円のWeb拠点構築</li>
            <li>スマホ完結のメディア運営術</li>
            <li>0円ツールを駆使した自動化検証</li>
        </ul>
    </div>

    <a href="https://docs.google.com/forms/..." class="btn">実験に参加・相談してみる</a>
</div>

</body>
</html>
